<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gif card</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Confere ai</h1>
        <nave>
            <a href="#">Inicio</a>
        </nave>
    </header>
    <main>
        <h2>Descubra a verdade passando o mouse</h2>
        <section>
            <article class="cartao">
                <div class="cartao-interno">
                   <div class="cartao-mentira">
                     <img class="cartao-imagem" src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849&quot; alt="Pinguim" class="cartao-imagem">
                     <p>Pinguins consegem voar com pássaros!</p>
                  </div>
                  <div clas = "cartao-verso">
                    <img class="cartao-imagem" src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849&quot; alt="Pinguim" class="cartao-imagem">
                    <p>Pinguins não voam, mas são excelentes nadadores.</p>
                  </div>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
